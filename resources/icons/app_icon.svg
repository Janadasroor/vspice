<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
    <!-- Background: Deep Tech Charcoal -->
    <rect width="1024" height="1024" rx="200" fill="#121212"/>
    
    <!-- Subtle Grid Background -->
    <path d="M0 256 H1024 M0 512 H1024 M0 768 H1024 M256 0 V1024 M512 0 V1024 M768 0 V1024" 
          stroke="#1a1a1a" stroke-width="4" fill="none"/>

    <!-- The "Flux F" Traces -->
    <g transform="translate(128, 128)">
        <!-- Main Vertical Stem & Top Arm -->
        <path d="M256 700 V256 H550" 
              fill="none" stroke="#007acc" stroke-width="80" stroke-linecap="round" stroke-linejoin="round"/>
        
        <!-- Middle Arm -->
        <path d="M256 450 H480" 
              fill="none" stroke="#007acc" stroke-width="80" stroke-linecap="round"/>

        <!-- Connection Pads (Gold/Copper Accent) -->
        <!-- Top Pad -->
        <circle cx="550" cy="256" r="60" fill="#b45309"/>
        <circle cx="550" cy="256" r="30" fill="#f59e0b"/>
        
        <!-- Bottom Pad -->
        <circle cx="256" cy="700" r="60" fill="#b45309"/>
        <circle cx="256" cy="700" r="30" fill="#f59e0b"/>
        
        <!-- Middle Pad -->
        <circle cx="480" cy="450" r="50" fill="#007acc"/>
        <circle cx="480" cy="450" r="20" fill="#ffffff" fill-opacity="0.6"/>
    </g>

    <!-- Outer Glow -->
    <rect width="1024" height="1024" rx="200" fill="none" stroke="#007acc" stroke-width="20" stroke-opacity="0.1"/>
</svg>
